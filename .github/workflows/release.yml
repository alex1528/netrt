name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build all targets
        env:
          GOOS: linux
          CGO_ENABLED: "0"
        run: |
          set -eu
          for target in amd64 arm64 armv7 386 mipsle; do
            case "$target" in
              armv7)
                GOARCH=arm
                GOARM=7
                SUFFIX=armv7
                ;;
              *)
                GOARCH="$target"
                GOARM=
                SUFFIX="$target"
                ;;
            esac

            GOARCH="$GOARCH" GOARM="$GOARM" \
              go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -o "netrt_linux_${SUFFIX}" main.go
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" netrt_linux_* --clobber
          else
            gh release create "${{ github.ref_name }}" netrt_linux_* \
              --generate-notes \
              --title "${{ github.ref_name }}"
          fi
