name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            goarm: ""
          - goarch: arm64
            goarm: ""
          - goarch: arm
            goarm: "7"
          - goarch: "386"
            goarm: ""
          - goarch: mipsle
            goarm: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then SUFFIX="${SUFFIX}v${{ matrix.goarm }}"; fi
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "netrt_linux_${SUFFIX}" main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: netrt_linux_${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: netrt_linux_*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" dist/netrt_linux_* --clobber
          else
            gh release create "${{ github.ref_name }}" dist/netrt_linux_* \
              --generate-notes \
              --title "${{ github.ref_name }}"
          fi
