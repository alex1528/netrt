name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goarch: amd64
            goarm: ""
          - goarch: arm64
            goarm: ""
          - goarch: arm
            goarm: "7"
          - goarch: "386"
            goarm: ""
          - goarch: mipsle
            goarm: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          SUFFIX="${{ matrix.goarch }}"
          if [ -n "${{ matrix.goarm }}" ]; then SUFFIX="${SUFFIX}v${{ matrix.goarm }}"; fi
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "netrt_linux_${SUFFIX}" main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netrt_linux_${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: netrt_linux_*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/netrt_linux_*
          generate_release_notes: true
